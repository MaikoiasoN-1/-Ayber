<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mensaje</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Arial Black', Impact, sans-serif;
        }

        .container {
            text-align: center;
            width: 100%;
            padding: 20px;
        }

        .giant-text {
            font-size: 14vw; /* Escala automáticamente con el ancho de la pantalla */
            color: #ff2a2a;
            text-transform: uppercase;
            letter-spacing: -2px;
            line-height: 0.9;
            user-select: none;
            text-shadow: 0 0 20px rgba(255, 42, 42, 0.6);
            animation: pulse 1.5s infinite alternate ease-in-out;
        }

        /* Efecto de parpadeo e impacto visual */
        @keyframes pulse {
            0% {
                transform: scale(1);
                text-shadow: 0 0 20px rgba(255, 42, 42, 0.6);
            }
            100% {
                transform: scale(1.03);
                text-shadow: 0 0 40px rgba(255, 42, 42, 0.9), 0 0 70px rgba(255, 0, 0, 0.5);
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="giant-text">VT A LA M 🖕🖕🖕🖕</h1>
    </div>

</body>
</html>
